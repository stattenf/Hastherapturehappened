baseURL = 'https://hastherapturehappened.com/'
languageCode = 'en-us'
title = 'Has The Rapture Happened?'
theme = 'custom'

[params]
  backgroundImage = '/images/background.jpg'
  description = 'Has the rapture happened? No. A running answer plus a history of failed rapture predictions.'
  # 1200×630 image used for Open Graph / Twitter link previews
  socialImage = '/images/og-default.jpg'

  [params.counter]
    enabled = true
    name = 'hastherapturehappened'
    url = '/counter'
    label = 'Visitors'

# Emit /status.json from the homepage build, sourced from content/current-prediction.md
[outputFormats.Status]
  mediaType = 'application/json'
  baseName = 'status'
  isPlainText = true
  notAlternative = true

[outputs]
  home = ['HTML', 'RSS', 'Status']
