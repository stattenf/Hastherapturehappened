# Shared hit-counter endpoint for Hugo (and other) sites.
#
# Install:
#   sudo install -d -o www-data -g www-data -m 0755 /var/lib/site-counters
#   sudo install -d -m 0755 /usr/share/site-counters
#   sudo install -m 0644 counter.php /usr/share/site-counters/counter.php
#   sudo cp apache-site-counters.conf /etc/apache2/conf-available/site-counters.conf
#   sudo a2enconf site-counters && sudo systemctl reload apache2
#
# Data files are writable state → /var/lib/site-counters (not /usr/share).
# The PHP script is static → /usr/share/site-counters.

Alias /counter /usr/share/site-counters/counter.php

<Location /counter>
    Require all granted
</Location>

<Directory /usr/share/site-counters>
    Require all granted
</Directory>
